<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#ffffff;
  --border:#E8E8E8;
  --blue:#0055FF;
  --blue-light:#EEF3FF;
  --text:#0A0A0A;
  --text-2:#555555;
  --text-3:#999999;
  --orange:#f97316;
  --r:14px;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}

/* BACKGROUND */
.bg-lines{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);}
.bg-line:nth-child(1){left:25%;}
.bg-line:nth-child(2){left:50%;}
.bg-line:nth-child(3){left:75%;}
.bg-noise{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");}
.bg-glow-1{position:fixed;width:400px;height:400px;background:var(--blue);border-radius:50%;filter:blur(120px);opacity:.05;top:5%;right:10%;pointer-events:none;z-index:0;animation:glow 7s ease-in-out infinite;}
.bg-glow-2{position:fixed;width:280px;height:280px;background:var(--orange);border-radius:50%;filter:blur(100px);opacity:.04;bottom:15%;left:8%;pointer-events:none;z-index:0;animation:glow 10s ease-in-out infinite reverse;}
@keyframes glow{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* MAIN */
main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px 80px;}

/* HEADER */
.page-header{text-align:center;margin-bottom:2.5rem;}
.page-header .label{font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);background:var(--blue-light);border:1px solid #d0dcff;border-radius:50px;padding:.3rem .9rem;display:inline-block;margin-bottom:1rem;}
.mister-ia{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.8rem,10vw,5.5rem);font-weight:700;letter-spacing:-.02em;line-height:1;background:linear-gradient(135deg,var(--blue),#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;}
.page-header h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;color:var(--text);line-height:1.2;}
.page-header p{color:var(--text-2);font-size:.95rem;margin-top:.5rem;}

/* VIDEO */
.video-wrapper{width:100%;max-width:400px;position:relative;}
.video-container{width:100%;border-radius:20px;overflow:hidden;border:1.5px solid var(--border);background:#0a0a0a;box-shadow:0 20px 60px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);position:relative;}
.video-container video{width:100%;display:block;max-height:700px;object-fit:contain;}

/* BOUTON LECTURE */
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;background:rgba(0,0,0,.15);transition:opacity .3s;}
.play-overlay.hidden{opacity:0;pointer-events:none;}
.play-btn{width:72px;height:72px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,.3);transition:transform .2s,box-shadow .2s;}
.play-btn svg{color:#0055FF;margin-left:5px;}
.play-overlay:hover .play-btn{transform:scale(1.1);box-shadow:0 12px 40px rgba(0,0,0,.4);}

/* BOUTON RÉDUIRE EN PLEIN ÉCRAN */
.exit-fs-btn{display:none;position:absolute;top:18px;right:18px;align-items:center;gap:.45rem;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:50px;padding:.55rem 1.1rem;font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;z-index:10;transition:background .2s;}
.exit-fs-btn:hover{background:rgba(255,255,255,.28);}
.video-container:fullscreen .exit-fs-btn,
.video-container:-webkit-full-screen .exit-fs-btn{display:flex;}
.video-container:fullscreen video,
.video-container:-webkit-full-screen video{max-height:100vh;height:100%;}

/* ACTIONS */
.actions{display:flex;flex-wrap:wrap;gap:.85rem;justify-content:center;margin-top:2rem;width:100%;max-width:400px;}
.btn-primary{display:inline-flex;align-items:center;gap:.5rem;background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:.85rem 1.6rem;font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:600;text-decoration:none;cursor:pointer;transition:transform .2s,box-shadow .2s,background .2s;white-space:nowrap;}
.btn-primary:hover{background:#003ecc;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,85,255,.25);}
.btn-secondary{display:inline-flex;align-items:center;gap:.5rem;background:#fff;color:var(--text);border:1.5px solid var(--border);border-radius:var(--r);padding:.85rem 1.6rem;font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:600;text-decoration:none;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;white-space:nowrap;}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,85,255,.1);}
.btn-linkedin{display:inline-flex;align-items:center;gap:.5rem;background:#0A66C2;color:#fff;border:none;border-radius:var(--r);padding:.85rem 1.6rem;font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:600;text-decoration:none;cursor:pointer;transition:transform .2s,box-shadow .2s,background .2s;white-space:nowrap;}
.btn-linkedin:hover{background:#084f97;transform:translateY(-2px);box-shadow:0 8px 24px rgba(10,102,194,.3);}

/* DIVIDER */
.divider{width:100%;max-width:400px;height:1px;background:var(--border);margin:2.2rem 0;}

/* IDENTITY */
.identity{text-align:center;}
.identity .name{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;color:var(--text);}
.identity .title{font-size:.88rem;color:var(--text-2);margin-top:.2rem;}

/* FOOTER */
footer{position:relative;z-index:1;text-align:center;padding:1.2rem;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-3);}

@media(max-width:600px){
  .actions{flex-direction:column;align-items:stretch;}
  .btn-primary,.btn-secondary,.btn-linkedin{justify-content:center;}
  .video-container video{max-height:280px;}
}
</style>

<script>
const video = document.getElementById('cv-video');
const container = document.getElementById('video-container');
const exitBtn = document.getElementById('exit-fs-btn');
const playOverlay = document.getElementById('play-overlay');
const actions = document.querySelector('.actions');

function goFullscreen() {
  const req = container.requestFullscreen || container.webkitRequestFullscreen;
  if (req) req.call(container);
  video.play();
  playOverlay.classList.add('hidden');
}

function exitFullscreenAndScroll() {
  if (document.fullscreenElement) document.exitFullscreen();
  else if (document.webkitFullscreenElement) document.webkitExitFullscreen();
}

function scrollToActions() {
  setTimeout(() => {
    actions.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}

playOverlay.addEventListener('click', goFullscreen);

video.addEventListener('click', () => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) goFullscreen();
});

video.addEventListener('play', () => playOverlay.classList.add('hidden'));
video.addEventListener('pause', () => { if (!document.fullscreenElement && !document.webkitFullscreenElement) playOverlay.classList.remove('hidden'); });

exitBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  exitFullscreenAndScroll();
});

video.addEventListener('ended', () => {
  playOverlay.classList.remove('hidden');
  exitFullscreenAndScroll();
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) scrollToActions();
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement) scrollToActions();
});
</script>
